name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  # Pin the dnSpyEx version we build against. This must be a released tag, not master:
  #  - the all-in-one zips bundle this dnSpy, so users would otherwise get an unreleased snapshot;
  #  - the standalone extension DLL is dropped into whatever dnSpy users installed, i.e. the
  #    official release — and on net48 its NuGet versions must match ours exactly (see issue #21
  #    and tests/check-host-deps.ps1), which is only stable if this ref is stable.
  # To adopt a newer dnSpy: bump this (and the same value in release.yml), run
  # tests/check-host-deps.ps1, and update any net48 PackageReference it flags.
  DNSPY_REF: v6.6.0

jobs:
  build:
    name: Build MCP Extension
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout MCP Extension
        uses: actions/checkout@v4
        with:
          path: dnSpy.Extension.MCP

      - name: Checkout dnSpy (parent repository)
        uses: actions/checkout@v4
        with:
          repository: dnSpyEx/dnSpy
          ref: ${{ env.DNSPY_REF }}
          path: dnSpy
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Move extension to Extensions subdir
        shell: pwsh
        run: Move-Item -Path dnSpy.Extension.MCP -Destination dnSpy\Extensions\dnSpy.Extension.MCP -Force

      # net48 uses strict assembly binding and dnSpy ships no binding redirects, so a NuGet
      # version that drifts from dnSpy's own net48 resolution builds fine and then throws
      # FileNotFoundException on the first MCP request at runtime (issue #21). Catch it here.
      - name: Check net48 dependency versions match dnSpy
        shell: pwsh
        working-directory: dnSpy\Extensions\dnSpy.Extension.MCP
        run: .\tests\check-host-deps.ps1 -Restore

      - name: Build extension (net48)
        shell: pwsh
        working-directory: dnSpy\Extensions\dnSpy.Extension.MCP
        run: dotnet build -c ${{ matrix.configuration }} -f net48

      - name: Build extension (net10.0-windows)
        shell: pwsh
        working-directory: dnSpy\Extensions\dnSpy.Extension.MCP
        run: dotnet build -c ${{ matrix.configuration }} -f net10.0-windows

      - name: Upload net48 artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: dnSpy.Extension.MCP-net48
          path: dnSpy/Extensions/dnSpy.Extension.MCP/bin/Release/net48/dnSpy.Extension.MCP.x.dll
          if-no-files-found: error

      - name: Upload net10.0-windows artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: dnSpy.Extension.MCP-net10.0-windows
          path: dnSpy/Extensions/dnSpy.Extension.MCP/bin/Release/net10.0-windows/dnSpy.Extension.MCP.x.dll
          if-no-files-found: error

  build-status:
    name: Build Status
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed!"
            exit 1
          fi
          echo "All builds completed successfully!"
