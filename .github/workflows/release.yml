name: Release

# Runs when you publish a GitHub release (or dispatch manually against an
# existing release tag). Build artifacts are attached to the release you
# created — this workflow never touches the release body, name, or flags.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to attach artifacts to (e.g., v0.1.2)"
        required: true
        type: string

jobs:
  release:
    name: Build and attach artifacts
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
          }
          echo "name=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Target tag: $tag"

      - name: Checkout MCP Extension at tag
        uses: actions/checkout@v4
        with:
          path: dnSpy.Extension.MCP
          ref: ${{ steps.tag.outputs.name }}

      - name: Checkout dnSpy
        uses: actions/checkout@v4
        with:
          repository: dnSpyEx/dnSpy
          path: dnSpy
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Move extension to Extensions subdir
        shell: pwsh
        run: Move-Item -Path dnSpy.Extension.MCP -Destination dnSpy\Extensions\dnSpy.Extension.MCP -Force

      # build.ps1 orchestrates: net48 build, net10 framework-dependent build,
      # and both win-x86 / win-x64 self-contained publishes, each with the
      # AppHostPatcher step — same script used for official dnSpy releases.
      #
      # -NoMsbuild makes it use `dotnet build` (from the SDK set up above)
      # instead of msbuild. The windows-latest runner's pre-installed msbuild
      # doesn't always have .NET 10 targeting packs registered; the extension
      # and dnSpy paths we need do not use COM references, so dotnet build
      # suffices.
      - name: Build dnSpy (all TFMs + self-contained x86/x64)
        shell: pwsh
        working-directory: dnSpy
        run: .\build.ps1 -NoMsbuild

      - name: List dnSpy build output (diagnostic)
        if: always()
        shell: pwsh
        run: |
          $root = "dnSpy\dnSpy\bin\Release"
          if (Test-Path $root) {
            Get-ChildItem $root -Recurse -Depth 2 -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName
          } else {
            Write-Host "No $root directory — the dnSpy build produced nothing."
          }

      # The MCP extension is not part of dnSpy.sln, so build.ps1 does not build
      # it. Build it directly against the freshly-built Contracts DLLs.
      - name: Build MCP extension (both TFMs)
        shell: pwsh
        working-directory: dnSpy\Extensions\dnSpy.Extension.MCP
        run: dotnet build -c Release

      - name: Bundle dnSpy + extension per TFM
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseRoot = "dnSpy\dnSpy\bin\Release"
          $extNet48 = "dnSpy\Extensions\dnSpy.Extension.MCP\bin\Release\net48\dnSpy.Extension.MCP.x.dll"
          $extNet10 = "dnSpy\Extensions\dnSpy.Extension.MCP\bin\Release\net10.0-windows\dnSpy.Extension.MCP.x.dll"

          # Bundle descriptors: (zip suffix, dnSpy deployment root, matching extension DLL)
          $bundles = @(
              @{ name = "net48";   src = "$releaseRoot\net48";                           dll = $extNet48 },
              @{ name = "win-x64"; src = "$releaseRoot\net10.0-windows\win-x64\publish"; dll = $extNet10 },
              @{ name = "win-x86"; src = "$releaseRoot\net10.0-windows\win-x86\publish"; dll = $extNet10 }
          )

          New-Item -ItemType Directory -Force -Path release | Out-Null

          foreach ($b in $bundles) {
              if (-not (Test-Path $b.src)) {
                  throw "Expected dnSpy build output at $($b.src) but it does not exist"
              }

              # dnSpy expects extensions under <bin>/Extensions/<name>/<name>.x.dll
              $destDir = Join-Path $b.src "bin\Extensions\dnSpy.Extension.MCP"
              New-Item -ItemType Directory -Force -Path $destDir | Out-Null
              Copy-Item -Path $b.dll -Destination $destDir

              $zip = "release\dnSpy-MCP-$($b.name).zip"
              Compress-Archive -Path "$($b.src)\*" -DestinationPath $zip -Force
              Write-Host "Built $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"
          }

          # Also ship the bare DLLs for users who already have dnSpy installed.
          Copy-Item $extNet48 "release\dnSpy.Extension.MCP-net48.dll"
          Copy-Item $extNet10 "release\dnSpy.Extension.MCP-net10.0-windows.dll"

          Get-ChildItem release | Format-Table Name, @{Name='SizeMB';Expression={[math]::Round($_.Length/1MB,1)}}

      # Attach artifacts to the already-created release. We do NOT set body,
      # body_path, name, draft, prerelease, or generate_release_notes — leaving
      # those unset makes action-gh-release preserve the release metadata you
      # wrote by hand.
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            release/dnSpy-MCP-net48.zip
            release/dnSpy-MCP-win-x64.zip
            release/dnSpy-MCP-win-x86.zip
            release/dnSpy.Extension.MCP-net48.dll
            release/dnSpy.Extension.MCP-net10.0-windows.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
