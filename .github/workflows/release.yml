name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

# Builds dnSpy from source, builds this extension, stitches the extension into
# the standard bin/Extensions/dnSpy.Extension.MCP/ layout, and ships:
#   * three ready-to-use zips (net48, net10 self-contained win-x64, net10
#     self-contained win-x86) — download, unzip, run dnSpy.exe, no install
#     path to figure out;
#   * the bare .x.dll files for users who already have dnSpy installed.
jobs:
  release:
    name: Build and package release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout MCP Extension
        uses: actions/checkout@v4
        with:
          path: dnSpy.Extension.MCP

      - name: Checkout dnSpy
        uses: actions/checkout@v4
        with:
          repository: dnSpyEx/dnSpy
          path: dnSpy
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Move extension to Extensions subdir
        shell: pwsh
        run: Move-Item -Path dnSpy.Extension.MCP -Destination dnSpy\Extensions\dnSpy.Extension.MCP -Force

      # build.ps1 orchestrates: net48 build, net10 framework-dependent build,
      # and both win-x86 / win-x64 self-contained publishes, each with the
      # AppHostPatcher step. This is the same script used for official dnSpy
      # releases.
      - name: Build dnSpy (all TFMs + self-contained x86/x64)
        shell: pwsh
        working-directory: dnSpy
        run: .\build.ps1

      # The MCP extension is not part of dnSpy.sln, so build.ps1 does not build
      # it. Build it directly against the freshly-built Contracts DLLs.
      - name: Build MCP extension (both TFMs)
        shell: pwsh
        working-directory: dnSpy\Extensions\dnSpy.Extension.MCP
        run: dotnet build -c Release

      - name: Bundle dnSpy + extension per TFM
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseRoot = "dnSpy\dnSpy\bin\Release"
          $extNet48 = "dnSpy\Extensions\dnSpy.Extension.MCP\bin\Release\net48\dnSpy.Extension.MCP.x.dll"
          $extNet10 = "dnSpy\Extensions\dnSpy.Extension.MCP\bin\Release\net10.0-windows\dnSpy.Extension.MCP.x.dll"

          # Bundle descriptors: (source layout to zip, extension DLL that matches it)
          $bundles = @(
              @{ name = "net48";       src = "$releaseRoot\net48";                         dll = $extNet48 },
              @{ name = "win-x64";     src = "$releaseRoot\net10.0-windows\win-x64\publish"; dll = $extNet10 },
              @{ name = "win-x86";     src = "$releaseRoot\net10.0-windows\win-x86\publish"; dll = $extNet10 }
          )

          New-Item -ItemType Directory -Force -Path release | Out-Null

          foreach ($b in $bundles) {
              if (-not (Test-Path $b.src)) {
                  throw "Expected dnSpy build output at $($b.src) but it does not exist"
              }

              # dnSpy expects extensions under <bin>/Extensions/<name>/<name>.x.dll
              $destDir = Join-Path $b.src "bin\Extensions\dnSpy.Extension.MCP"
              New-Item -ItemType Directory -Force -Path $destDir | Out-Null
              Copy-Item -Path $b.dll -Destination $destDir

              $zip = "release\dnSpy-MCP-$($b.name).zip"
              Compress-Archive -Path "$($b.src)\*" -DestinationPath $zip -Force
              Write-Host "Built $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"
          }

          # Also ship the bare DLLs for users who already have dnSpy installed.
          Copy-Item $extNet48 "release\dnSpy.Extension.MCP-net48.dll"
          Copy-Item $extNet10 "release\dnSpy.Extension.MCP-net10.0-windows.dll"

          Get-ChildItem release | Format-Table Name, @{Name='SizeMB';Expression={[math]::Round($_.Length/1MB,1)}}

      - name: Get tag name
        id: get_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          } else {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Release tag: $tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download

            Three ready-to-run bundles — download, unzip, launch `dnSpy.exe`.
            The MCP extension is already placed in the correct folder inside
            each bundle, so no install-path fiddling is needed.

            | File | Contents | Runtime requirement |
            |------|----------|---------------------|
            | `dnSpy-MCP-net48.zip` | dnSpy .NET Framework 4.8 build + MCP extension | .NET Framework 4.8 (included with Windows 10+) |
            | `dnSpy-MCP-win-x64.zip` | dnSpy .NET 10 self-contained x64 + MCP extension | None — runtime is bundled |
            | `dnSpy-MCP-win-x86.zip` | dnSpy .NET 10 self-contained x86 + MCP extension | None — runtime is bundled |

            For advanced users who already have dnSpy installed and only want
            the plugin, grab the raw DLL instead:

            - `dnSpy.Extension.MCP-net48.dll` (for .NET Framework 4.8 dnSpy)
            - `dnSpy.Extension.MCP-net10.0-windows.dll` (for .NET 10 dnSpy)

            Rename to `dnSpy.Extension.MCP.x.dll` and place under
            `<dnSpy>\bin\Extensions\dnSpy.Extension.MCP\`.
          files: |
            release/dnSpy-MCP-net48.zip
            release/dnSpy-MCP-win-x64.zip
            release/dnSpy-MCP-win-x86.zip
            release/dnSpy.Extension.MCP-net48.dll
            release/dnSpy.Extension.MCP-net10.0-windows.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
